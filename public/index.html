<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoPay · 测试面板</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif; background: #f0ebe4; color: #2c2c2c; }

.header { background: #2c3e50; color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 20px; }
.header span { font-size: 13px; opacity: 0.7; }

.container { max-width: 800px; margin: 0 auto; padding: 20px; }

.card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.card h2 { font-size: 16px; margin-bottom: 12px; color: #2c3e50; display: flex; align-items: center; gap: 8px; }

.row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 10px; }
.row:last-child { margin-bottom: 0; }

label { display: block; font-size: 12px; color: #888; margin-bottom: 2px; }
input, select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; transition: border-color 0.2s; font-family: inherit; }
input:focus, select:focus { border-color: #3498db; }
input[type="text"], input[type="number"] { width: 140px; }
input.full { width: 100%; }

.field { display: flex; flex-direction: column; }

button { padding: 8px 18px; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; transition: all 0.15s; font-weight: 500; white-space: nowrap; }
button:active { transform: scale(0.97); }
.btn-primary { background: #3498db; color: #fff; }
.btn-primary:hover { background: #2980b9; }
.btn-success { background: #27ae60; color: #fff; }
.btn-success:hover { background: #219a52; }
.btn-danger { background: #e74c3c; color: #fff; }
.btn-danger:hover { background: #c0392b; }
.btn-warning { background: #f39c12; color: #fff; }
.btn-warning:hover { background: #d68910; }
.btn-outline { background: transparent; border: 1px solid #ddd; color: #666; }
.btn-outline:hover { border-color: #999; color: #333; }
button:disabled { opacity: 0.5; cursor: not-allowed; }

.result { margin-top: 8px; background: #f8f9fa; border-radius: 8px; padding: 10px 14px; font-size: 13px; font-family: 'SF Mono', Menlo, monospace; white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto; border-left: 3px solid #3498db; }
.result.success { border-left-color: #27ae60; }
.result.error { border-left-color: #e74c3c; color: #c0392b; }
.result-title { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.result-empty { text-align: center; padding: 24px; color: #999; font-size: 14px; }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #eee; }
th { font-weight: 600; color: #666; font-size: 12px; text-transform: uppercase; letter-spacing: 0.3px; }
tr:hover td { background: #f8f9fa; }

.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.badge-green { background: #e8f5e9; color: #27ae60; }
.badge-blue { background: #e3f2fd; color: #2980b9; }
.badge-orange { background: #fff3e0; color: #f39c12; }

.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.stat-box { text-align: center; padding: 16px; background: #f8f9fa; border-radius: 8px; }
.stat-box .num { font-size: 28px; font-weight: 700; color: #2c3e50; }
.stat-box .label { font-size: 12px; color: #888; margin-top: 4px; }

#currentBalance { font-size: 36px; font-weight: 700; color: #2c3e50; text-align: center; padding: 8px 0; }
#balanceUnit { font-size: 16px; color: #888; }

.status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.status-dot.online { background: #27ae60; }
.status-dot.offline { background: #e74c3c; }
.status-text { font-size: 13px; color: #666; }

@media (max-width: 600px) {
  .row { flex-direction: column; align-items: stretch; }
  input[type="text"], input[type="number"] { width: 100%; }
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="header">
  <h1>💰 AutoPay 测试面板</h1>
  <span id="serverStatus"><span class="status-dot offline"></span><span class="status-text">连接中...</span></span>
</div>

<div class="container" id="app">
  <!-- 当前用户 -->
  <div class="card">
    <h2>👤 当前用户</h2>
    <div class="row">
      <div class="field">
        <label>手机号</label>
        <input type="text" id="phoneInput" placeholder="手机号">
      </div>
      <div class="field">
        <label>昵称（新用户可选）</label>
        <input type="text" id="nicknameInput" placeholder="给自己起个名字">
      </div>
      <button class="btn-primary" onclick="createUser()">创建/查找用户</button>
    </div>
    <div id="userInfo" style="display:none;padding:10px 14px;background:#e8f5e9;border-radius:8px;margin-top:8px;font-size:14px"></div>
    <div class="result" id="userResult" style="display:none"></div>
    <div style="margin-top:8px;display:flex;gap:8px;align-items:center">
      <button class="btn-outline" onclick="loadUserList()">📋 所有用户</button>
      <span id="userCount" style="font-size:12px;color:#888"></span>
    </div>
    <div id="userList" style="display:none;margin-top:8px"></div>
  </div>

  <!-- 余额 -->
  <div class="card">
    <h2>💰 余额</h2>
    <div id="currentBalance">-- <span id="balanceUnit">元</span></div>
    <div class="row" style="justify-content:center; gap:16px; margin-top:12px">
      <button class="btn-primary" onclick="refreshBalance()">🔄 刷新余额</button>
    </div>
  </div>

  <!-- 操作 -->
  <div class="card">
    <h2>⚡ 操作</h2>
    <div class="grid">
      <!-- 充值 -->
      <div style="padding:8px; background:#f8f9fa; border-radius:8px">
        <div style="font-size:13px;font-weight:600;margin-bottom:8px">💳 充值</div>
        <div class="field" style="margin-bottom:8px">
          <label>金额（元）</label>
          <input type="number" id="rechargeAmount" value="10" min="0.01" step="0.01">
        </div>
        <div class="field" style="margin-bottom:8px">
          <label>方式</label>
          <select id="rechargeMethod">
            <option value="wechat">微信支付</option>
            <option value="alipay">支付宝</option>
            <option value="admin">管理员充值</option>
          </select>
        </div>
        <button class="btn-success" onclick="doRecharge()" style="width:100%">充值</button>
        <div class="result" id="rechargeResult" style="display:none;margin-top:8px"></div>
      </div>

      <!-- 扣款 -->
      <div style="padding:8px; background:#f8f9fa; border-radius:8px">
        <div style="font-size:13px;font-weight:600;margin-bottom:8px">📉 扣款（模拟AI消耗）</div>
        <div class="field" style="margin-bottom:8px">
          <label>金额（元）</label>
          <input type="number" id="deductAmount" value="2" min="0.01" step="0.01">
        </div>
        <div class="field" style="margin-bottom:8px">
          <label>模型</label>
          <input type="text" id="deductModel" value="doubao-1.5" placeholder="模型名">
        </div>
        <div class="field" style="margin-bottom:8px">
          <label>描述</label>
          <input type="text" id="deductTask" value="屏幕分析" placeholder="任务描述">
        </div>
        <button class="btn-danger" onclick="doDeduct()" style="width:100%">扣款</button>
        <div class="result" id="deductResult" style="display:none;margin-top:8px"></div>
      </div>
    </div>
  </div>

  <!-- 统计 -->
  <div class="card">
    <h2>📊 统计</h2>
    <div class="grid" id="statsGrid">
      <div class="stat-box"><div class="num" id="statRecharge">0</div><div class="label">总充值</div></div>
      <div class="stat-box"><div class="num" id="statDeduct">0</div><div class="label">总消费</div></div>
      <div class="stat-box"><div class="num" id="statRechargeCount">0</div><div class="label">充值次数</div></div>
      <div class="stat-box"><div class="num" id="statDeductCount">0</div><div class="label">消费次数</div></div>
    </div>
    <button class="btn-outline" onclick="refreshStats()" style="margin-top:12px">🔄 刷新统计</button>
  </div>

  <!-- 充值记录 -->
  <div class="card">
    <h2>📋 充值记录</h2>
    <div id="rechargeRecords"><div class="result-empty">暂无记录</div></div>
    <button class="btn-outline" onclick="refreshRechargeRecords()" style="margin-top:8px">🔄 刷新</button>
  </div>

  <!-- 消费记录 -->
  <div class="card">
    <h2>📋 消费记录</h2>
    <div id="deductRecords"><div class="result-empty">暂无记录</div></div>
    <button class="btn-outline" onclick="refreshDeductRecords()" style="margin-top:8px">🔄 刷新</button>
  </div>
</div>

<script>
const BASE = window.location.origin;
let currentUserId = null;

// ── 检查服务端连接 ──
async function checkServer() {
  try {
    const res = await fetch(`${BASE}/api/users`);
    if (res.ok) {
      document.querySelector('#serverStatus').innerHTML = '<span class="status-dot online"></span><span class="status-text">服务端在线</span>';
      return true;
    }
  } catch (e) {}
  document.querySelector('#serverStatus').innerHTML = '<span class="status-dot offline"></span><span class="status-text" style="color:#e74c3c">无法连接服务端</span>';
  return false;
}

// ── 创建/获取用户 ──
async function createUser() {
  try {
  const phone = document.getElementById('phoneInput').value.trim();
  const nickname = document.getElementById('nicknameInput').value.trim();
  if (!phone) return showResult('userResult', '请输入手机号', 'error');

  const res = await fetch(`${BASE}/api/users`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ phone, nickname }),
  });
  const data = await res.json();
  if (data.ok) {
    currentUserId = data.user.id;
    // 保存到 localStorage，刷新后自动恢复
    localStorage.setItem('autoPay_lastPhone', phone);
    localStorage.setItem('autoPay_lastNickname', data.user.nickname);
    // 显示用户信息
    document.getElementById('userInfo').style.display = 'block';
    document.getElementById('userInfo').innerHTML =
      `✅ 当前用户: <b>${escapeHtml(data.user.nickname)}</b> &nbsp;|&nbsp; 📱 ${data.user.phone} &nbsp;|&nbsp; 🆔 ${data.user.id}`;
    // 隐藏旧的 result 框（已经用 userInfo 替代）
    document.getElementById('userResult').style.display = 'none';
    refreshAll();
  } else {
    showResult('userResult', data.error, 'error');
  }
  } catch(e) {
    showResult('userResult', '请求失败: ' + e.message, 'error');
  }
}

// ── 从 localStorage 恢复上次使用的用户 ──
async function restoreLastUser() {
  const lastPhone = localStorage.getItem('autoPay_lastPhone');
  if (!lastPhone) return false;
  document.getElementById('phoneInput').value = lastPhone;
  const savedNick = localStorage.getItem('autoPay_lastNickname');
  if (savedNick) document.getElementById('nicknameInput').value = savedNick;
  await createUser();
  return true;
}

// ── 用户列表 ──
async function loadUserList() {
  const res = await fetch(`${BASE}/api/users`);
  const data = await res.json();
  const el = document.getElementById('userList');
  if (!data.ok || data.users.length === 0) {
    el.style.display = 'block';
    el.innerHTML = '<div class="result-empty">暂无用户</div>';
    return;
  }
  document.getElementById('userCount').textContent = `共 ${data.users.length} 个用户`;
  el.style.display = 'block';
  el.innerHTML = `<table>
    <tr><th>ID</th><th>手机号</th><th>昵称</th><th>创建时间</th><th></th></tr>
    ${data.users.map(u => `
      <tr>
        <td>${u.id}</td>
        <td>${u.phone}</td>
        <td>${escapeHtml(u.nickname)}</td>
        <td style="font-size:12px;color:#888">${u.created_at}</td>
        <td><button class="btn-outline" style="padding:2px 10px;font-size:12px" onclick="switchToUser('${u.phone}','${escapeHtml(u.nickname)}')">切换</button></td>
      </tr>
    `).join('')}
  </table>`;
}

function switchToUser(phone, nickname) {
  document.getElementById('phoneInput').value = phone;
  document.getElementById('nicknameInput').value = nickname;
  createUser();
  document.getElementById('userList').style.display = 'none';
}

// ── 刷新余额 ──
async function refreshBalance() {
  if (!currentUserId) return showAlert('请先创建用户');
  const res = await fetch(`${BASE}/api/balance/${currentUserId}`);
  const data = await res.json();
  if (data.ok) {
    document.getElementById('currentBalance').innerHTML =
      `<span style="color:${data.balance.amount > 0 ? '#27ae60' : '#888'}">${data.balance.amount.toFixed(2)}</span> <span id="balanceUnit">元</span>`;
  }
}

// ── 充值 ──
async function doRecharge() {
  if (!currentUserId) return showAlert('请先创建用户');
  const amount = parseFloat(document.getElementById('rechargeAmount').value);
  const method = document.getElementById('rechargeMethod').value;
  if (!amount || amount <= 0) return showResult('rechargeResult', '请输入有效金额', 'error');

  document.querySelector('#rechargeResult').previousElementSibling.disabled = true;
  const res = await fetch(`${BASE}/api/recharge`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ userId: currentUserId, amount, method }),
  });
  const data = await res.json();
  document.querySelector('#rechargeResult').previousElementSibling.disabled = false;

  if (data.ok) {
    showResult('rechargeResult', `✅ 充值成功 +${amount.toFixed(2)}元\n余额: ${data.balance.amount.toFixed(2)}元`, 'success');
    refreshAll();
  } else {
    showResult('rechargeResult', data.error, 'error');
  }
}

// ── 扣款 ──
async function doDeduct() {
  if (!currentUserId) return showAlert('请先创建用户');
  const amount = parseFloat(document.getElementById('deductAmount').value);
  const model = document.getElementById('deductModel').value.trim();
  const taskDesc = document.getElementById('deductTask').value.trim();
  if (!amount || amount <= 0) return showResult('deductResult', '请输入有效金额', 'error');

  const btn = document.querySelector('#deductResult').previousElementSibling;
  btn.disabled = true;
  const res = await fetch(`${BASE}/api/deduct`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      userId: currentUserId,
      amount,
      model,
      tokensIn: Math.floor(Math.random() * 2000) + 500,
      tokensOut: Math.floor(Math.random() * 1000) + 100,
      taskDesc,
    }),
  });
  const data = await res.json();
  btn.disabled = false;

  if (data.ok) {
    showResult('deductResult', `✅ 扣款成功 -${amount.toFixed(2)}元\n余额: ${data.balance.amount.toFixed(2)}元\n模型: ${model}`, 'success');
    refreshAll();
  } else {
    showResult('deductResult', data.error, 'error');
  }
}

// ── 充值记录 ──
async function refreshRechargeRecords() {
  const userId = currentUserId;
  if (!userId) return;
  const res = await fetch(`${BASE}/api/recharge/records/${userId}`);
  const data = await res.json();
  const el = document.getElementById('rechargeRecords');
  if (!data.ok || data.records.length === 0) {
    el.innerHTML = '<div class="result-empty">暂无充值记录</div>';
    return;
  }
  el.innerHTML = `<table>
    <tr><th>#</th><th>金额</th><th>方式</th><th>时间</th></tr>
    ${data.records.map((r, i) => `
      <tr>
        <td>${r.id}</td>
        <td style="color:#27ae60;font-weight:600">+${r.amount.toFixed(2)}</td>
        <td><span class="badge badge-${r.method === 'wechat' ? 'green' : r.method === 'alipay' ? 'blue' : 'orange'}">${r.method === 'wechat' ? '微信' : r.method === 'alipay' ? '支付宝' : r.method}</span></td>
        <td style="color:#888;font-size:12px">${r.created_at}</td>
      </tr>
    `).join('')}
  </table>`;
}

// ── 消费记录 ──
async function refreshDeductRecords() {
  const userId = currentUserId;
  if (!userId) return;
  const res = await fetch(`${BASE}/api/deduct/records/${userId}`);
  const data = await res.json();
  const el = document.getElementById('deductRecords');
  if (!data.ok || data.records.length === 0) {
    el.innerHTML = '<div class="result-empty">暂无消费记录</div>';
    return;
  }
  el.innerHTML = `<table>
    <tr><th>#</th><th>金额</th><th>模型</th><th>tokens</th><th>描述</th><th>时间</th></tr>
    ${data.records.map(r => `
      <tr>
        <td>${r.id}</td>
        <td style="color:#e74c3c;font-weight:600">-${r.amount.toFixed(2)}</td>
        <td style="font-size:12px">${r.model || '-'}</td>
        <td style="font-size:12px;color:#888">${r.tokens_in || 0}→${r.tokens_out || 0}</td>
        <td style="font-size:12px;color:#666">${r.task_desc || '-'}</td>
        <td style="font-size:12px;color:#888">${r.created_at}</td>
      </tr>
    `).join('')}
  </table>`;
}

// ── 统计 ──
async function refreshStats() {
  if (!currentUserId) return;
  const res = await fetch(`${BASE}/api/stats/${currentUserId}`);
  const data = await res.json();
  if (data.ok) {
    document.getElementById('statRecharge').textContent = data.stats.totalRecharge.toFixed(2);
    document.getElementById('statDeduct').textContent = data.stats.totalDeduction.toFixed(2);
    document.getElementById('statRechargeCount').textContent = data.stats.rechargeCount;
    document.getElementById('statDeductCount').textContent = data.stats.deductionCount;
  }
}

// ── 刷新全部 ──
function refreshAll() {
  refreshBalance();
  refreshRechargeRecords();
  refreshDeductRecords();
  refreshStats();
}

// ── 工具函数 ──
function showResult(id, content, type) {
  const el = document.getElementById(id);
  el.style.display = 'block';
  el.textContent = content;
  el.className = 'result ' + (type || '');
}

function showAlert(msg) {
  const el = document.getElementById('userResult');
  el.style.display = 'block';
  el.textContent = '⚠️ ' + msg;
  el.className = 'result error';
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── 启动 ──
async function init() {
  const online = await checkServer();
  if (online) {
    // 尝试恢复上次使用的用户，没有则留空让用户手动创建
    const restored = await restoreLastUser();
    if (!restored) {
      // 恢复输入框焦点
      document.getElementById('phoneInput').placeholder = '输入手机号，点击创建';
    }
  }
}

init();
</script>
</body>
</html>
