<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoPay · 聚合支付测试面板</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif; background: #f0ebe4; color: #2c2c2c; }

.header { background: #2c3e50; color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.header h1 { font-size: 20px; }
.header span { font-size: 13px; opacity: 0.7; }
.header .badge { background: #e67e22; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 4px; margin-left: 6px; }

.container { max-width: 900px; margin: 0 auto; padding: 20px; }
.card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.card h2 { font-size: 16px; margin-bottom: 12px; color: #2c3e50; display: flex; align-items: center; gap: 8px; }

.row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 10px; }
.row:last-child { margin-bottom: 0; }
label { display: block; font-size: 12px; color: #888; margin-bottom: 2px; }
input, select, textarea { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; transition: border-color 0.2s; font-family: inherit; }
input:focus, select:focus, textarea:focus { border-color: #3498db; }
input[type="text"], input[type="number"] { width: 140px; }
input.full { width: 100%; }
textarea { width: 100%; resize: vertical; }
.field { display: flex; flex-direction: column; }

button { padding: 8px 18px; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; transition: all 0.15s; font-weight: 500; white-space: nowrap; }
button:active { transform: scale(0.97); }
.btn-primary { background: #3498db; color: #fff; }
.btn-primary:hover { background: #2980b9; }
.btn-success { background: #27ae60; color: #fff; }
.btn-success:hover { background: #219a52; }
.btn-danger { background: #e74c3c; color: #fff; }
.btn-danger:hover { background: #c0392b; }
.btn-warning { background: #f39c12; color: #fff; }
.btn-warning:hover { background: #d68910; }
.btn-outline { background: transparent; border: 1px solid #ddd; color: #666; }
.btn-outline:hover { border-color: #999; color: #333; }
button:disabled { opacity: 0.5; cursor: not-allowed; }
button.small { padding: 4px 12px; font-size: 12px; }

.result { margin-top: 8px; background: #f8f9fa; border-radius: 8px; padding: 10px 14px; font-size: 13px; font-family: 'SF Mono', Menlo, monospace; white-space: pre-wrap; word-break: break-all; max-height: 250px; overflow-y: auto; border-left: 3px solid #3498db; }
.result.success { border-left-color: #27ae60; }
.result.error { border-left-color: #e74c3c; color: #c0392b; }
.result-title { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.result-empty { text-align: center; padding: 24px; color: #999; font-size: 14px; }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #eee; }
th { font-weight: 600; color: #666; font-size: 12px; text-transform: uppercase; letter-spacing: 0.3px; }
tr:hover td { background: #f8f9fa; }

.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.badge-green { background: #e8f5e9; color: #27ae60; }
.badge-blue { background: #e3f2fd; color: #2980b9; }
.badge-orange { background: #fff3e0; color: #f39c12; }
.badge-red { background: #fce4ec; color: #e74c3c; }
.badge-gray { background: #f5f5f5; color: #999; }

.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

.stat-box { text-align: center; padding: 16px; background: #f8f9fa; border-radius: 8px; }
.stat-box .num { font-size: 28px; font-weight: 700; color: #2c3e50; }
.stat-box .label { font-size: 12px; color: #888; margin-top: 4px; }

#currentBalance { font-size: 36px; font-weight: 700; color: #2c3e50; text-align: center; padding: 8px 0; }
#balanceUnit { font-size: 16px; color: #888; }

.status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.status-dot.online { background: #27ae60; }
.status-dot.offline { background: #e74c3c; }
.status-text { font-size: 13px; color: #666; }

.tabs { display: flex; gap: 4px; margin-bottom: 16px; }
.tab { padding: 8px 16px; background: #eee; border-radius: 6px 6px 0 0; font-size: 13px; cursor: pointer; border: none; }
.tab.active { background: #fff; font-weight: 600; border-bottom: 2px solid #3498db; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

@media (max-width: 600px) {
  .row { flex-direction: column; align-items: stretch; }
  input[type="text"], input[type="number"] { width: 100%; }
  .grid, .grid-3 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="header">
  <h1>💰 AutoPay · 聚合支付平台 <span class="badge">Mock Shell</span></h1>
  <span id="serverStatus"><span class="status-dot offline"></span><span class="status-text">连接中...</span></span>
</div>

<div class="container" id="app">
  <!-- ── 全局用户栏（所有 Tab 共享） ── -->
  <div class="card" style="padding:16px">
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <div class="field" style="flex:1;min-width:120px">
        <label>手机号</label>
        <input type="text" id="phoneInput" placeholder="手机号" style="width:100%">
      </div>
      <div class="field" style="flex:1;min-width:120px">
        <label>昵称（新用户可选）</label>
        <input type="text" id="nicknameInput" placeholder="给自己起个名字" style="width:100%">
      </div>
      <button class="btn-primary" onclick="createUser()" style="margin-top:16px">创建/查找用户</button>
      <button class="btn-outline" onclick="loadUserList()" style="margin-top:16px">📋 用户列表</button>
    </div>
    <div id="userInfo" style="display:none;padding:10px 14px;background:#e8f5e9;border-radius:8px;margin-top:10px;font-size:14px"></div>
    <div id="userList" style="display:none;margin-top:8px"></div>
    <div class="result" id="userResult" style="display:none;margin-top:8px"></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="basic" onclick="switchTab('basic')">基础功能</button>
    <button class="tab" data-tab="payment" onclick="switchTab('payment')">聚合支付</button>
  </div>

  <!-- ══════════ Tab: 基础功能 ══════════ -->
  <div class="tab-panel active" id="tab-basic">
    <!-- 余额 -->
    <div class="card">
      <h2>💰 余额</h2>
      <div id="currentBalance">-- <span id="balanceUnit">元</span></div>
      <div class="row" style="justify-content:center; gap:16px; margin-top:12px">
        <button class="btn-primary" onclick="refreshBalance()">🔄 刷新余额</button>
      </div>
    </div>

    <!-- 统计 -->
    <div class="card">
      <h2>📊 统计</h2>
      <div class="grid" id="statsGrid">
        <div class="stat-box"><div class="num" id="statTotalPaid">0</div><div class="label">已支付总额</div></div>
        <div class="stat-box"><div class="num" id="statTotalRefunded">0</div><div class="label">已退款总额</div></div>
        <div class="stat-box"><div class="num" id="statPaidOrders">0</div><div class="label">已支付订单</div></div>
        <div class="stat-box"><div class="num" id="statTotalOrders">0</div><div class="label">总订单数</div></div>
        <div class="stat-box"><div class="num" id="statTotalDeduct">0</div><div class="label">总消费</div></div>
        <div class="stat-box"><div class="num" id="statDeductCount">0</div><div class="label">消费次数</div></div>
      </div>
      <button class="btn-outline" onclick="refreshStats()" style="margin-top:12px">🔄 刷新统计</button>
    </div>

    <!-- 消费管理 -->
    <div class="card">
      <h2>📉 消费管理</h2>
      <div class="row">
        <div class="field">
          <label>金额（元）</label>
          <input type="number" id="deductAmount" value="2" min="0.01" step="0.01">
        </div>
        <div class="field">
          <label>模型（可选）</label>
          <input type="text" id="deductModel" value="" placeholder="例如 doubao-1.5">
        </div>
        <div class="field" style="flex:1">
          <label>描述（可选）</label>
          <input type="text" id="deductTask" value="" placeholder="消费原因" style="width:100%">
        </div>
        <button class="btn-danger" onclick="doDeduct()" style="margin-top:16px">💸 扣款</button>
      </div>
      <div class="result" id="deductResult" style="display:none;margin-top:8px"></div>
      <div style="margin-top:16px">
        <div style="font-size:14px;font-weight:600;margin-bottom:8px">📋 消费记录</div>
        <div id="deductRecords"><div class="result-empty">暂无记录</div></div>
        <button class="btn-outline" onclick="refreshDeductRecords()" style="margin-top:8px">🔄 刷新</button>
      </div>
    </div>
  </div>

  <!-- ══════════ Tab: 聚合支付 ══════════ -->
  <div class="tab-panel" id="tab-payment">
    <!-- 支付渠道 -->
    <div class="card">
      <h2>🏦 支付渠道 <span style="font-size:12px;color:#888">(Mock)</span></h2>
      <div id="channelList" class="grid-3"></div>
    </div>

    <!-- 创建订单 -->
    <div class="card">
      <h2>📝 创建支付订单</h2>
      <div class="row">
        <div class="field">
          <label>金额（元）</label>
          <input type="number" id="payAmount" value="10" min="0.01" step="0.01">
        </div>
        <div class="field">
          <label>商品标题</label>
          <input type="text" id="paySubject" value="平台充值" placeholder="例如：充值VIP">
        </div>
        <div class="field">
          <label>支付渠道</label>
          <select id="payChannel">
            <option value="mock">模拟支付（直接确认）</option>
            <option value="wechat">微信支付（Mock）</option>
            <option value="alipay">支付宝（Mock）</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div class="field" style="flex:1">
          <label>描述（可选）</label>
          <input type="text" id="payDescription" value="" placeholder="订单描述" style="width:100%">
        </div>
        <div class="field" style="flex:1">
          <label>回调地址（可选）</label>
          <input type="text" id="payCallbackUrl" value="" placeholder="支付完成后通知的URL" style="width:100%">
        </div>
      </div>
      <div class="row">
        <button class="btn-success" onclick="createPaymentOrder()">📄 创建订单</button>
        <button class="btn-warning" onclick="quickPay()">⚡ 快捷支付（创建+立即支付）</button>
      </div>
      <div class="result" id="payResult" style="display:none"></div>
    </div>

    <!-- 手动模拟支付 -->
    <div class="card">
      <h2>✅ 模拟支付操作</h2>
      <div class="row">
        <div class="field" style="flex:1">
          <label>订单号</label>
          <input type="text" id="manualOrderId" placeholder="输入订单号 (PAY...)" style="width:100%">
        </div>
        <button class="btn-success" onclick="manualPay()">💳 模拟支付</button>
        <button class="btn-warning" onclick="manualClose()">🔒 关闭订单</button>
        <button class="btn-danger" onclick="manualRefund()">↩️ 退款</button>
        <button class="btn-primary" onclick="manualQueryOrder()">🔍 查询订单</button>
      </div>
      <div class="result" id="manualPayResult" style="display:none"></div>
    </div>

    <!-- 我的订单 -->
    <div class="card">
      <h2>📋 我的订单</h2>
      <div id="myOrders"><div class="result-empty">暂无订单</div></div>
      <button class="btn-outline" onclick="refreshUserOrders()" style="margin-top:8px">🔄 刷新</button>
    </div>

    <!-- 全部订单 -->
    <div class="card">
      <h2>📋 全部订单（管理用）</h2>
      <div id="allOrders"><div class="result-empty">暂无订单</div></div>
      <button class="btn-outline" onclick="refreshAllOrders()" style="margin-top:8px">🔄 刷新</button>
    </div>

    <!-- 回调日志 -->
    <div class="card">
      <h2>📞 回调日志</h2>
      <div id="callbackLogs"><div class="result-empty">输入订单号，点击「查询回调」</div></div>
      <div class="row" style="margin-top:8px">
        <div class="field" style="flex:1">
          <input type="text" id="callbackOrderId" placeholder="输入订单号查询回调日志" style="width:100%">
        </div>
        <button class="btn-outline" onclick="queryCallbacks()">📞 查询回调</button>
      </div>
    </div>
  </div>
</div>

<script>
const BASE = window.location.origin;
let currentUserId = null;

// ── Tab 切换 ──
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${name}"]`).classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
}

// ── 检查服务端连接 ──
async function checkServer() {
  try {
    const res = await fetch(`${BASE}/api/users`);
    if (res.ok) {
      document.querySelector('#serverStatus').innerHTML = '<span class="status-dot online"></span><span class="status-text">服务端在线</span>';
      return true;
    }
  } catch (e) {}
  document.querySelector('#serverStatus').innerHTML = '<span class="status-dot offline"></span><span class="status-text" style="color:#e74c3c">无法连接服务端</span>';
  return false;
}

// ── 创建/获取用户 ──
async function createUser() {
  try {
    const phone = document.getElementById('phoneInput').value.trim();
    const nickname = document.getElementById('nicknameInput').value.trim();
    if (!phone) return showResult('userResult', '请输入手机号', 'error');
    const res = await fetch(`${BASE}/api/users`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone, nickname }),
    });
    const data = await res.json();
    if (data.ok) {
      currentUserId = data.user.id;
      localStorage.setItem('autoPay_lastPhone', phone);
      localStorage.setItem('autoPay_lastNickname', data.user.nickname);
      document.getElementById('userInfo').style.display = 'block';
      document.getElementById('userInfo').innerHTML =
        `✅ 当前用户: <b>${escapeHtml(data.user.nickname)}</b> &nbsp;|&nbsp; 📱 ${data.user.phone} &nbsp;|&nbsp; 🆔 ${data.user.id}`;
      document.getElementById('userResult').style.display = 'none';
      refreshAll();
    } else {
      showResult('userResult', data.error, 'error');
    }
  } catch(e) {
    showResult('userResult', '请求失败: ' + e.message, 'error');
  }
}

// ── 从 localStorage 恢复上次使用的用户 ──
async function restoreLastUser() {
  const lastPhone = localStorage.getItem('autoPay_lastPhone');
  if (!lastPhone) return false;
  document.getElementById('phoneInput').value = lastPhone;
  const savedNick = localStorage.getItem('autoPay_lastNickname');
  if (savedNick) document.getElementById('nicknameInput').value = savedNick;
  await createUser();
  return true;
}

// ── 用户列表 ──
async function loadUserList() {
  const res = await fetch(`${BASE}/api/users`);
  const data = await res.json();
  const el = document.getElementById('userList');
  if (!data.ok || data.users.length === 0) {
    el.style.display = 'block';
    el.innerHTML = '<div class="result-empty">暂无用户</div>';
    return;
  }
  document.getElementById('userCount').textContent = `共 ${data.users.length} 个用户`;
  el.style.display = 'block';
  el.innerHTML = `<table>
    <tr><th>ID</th><th>手机号</th><th>昵称</th><th>创建时间</th><th></th></tr>
    ${data.users.map(u => `
      <tr>
        <td>${u.id}</td>
        <td>${u.phone}</td>
        <td>${escapeHtml(u.nickname)}</td>
        <td style="font-size:12px;color:#888">${u.created_at}</td>
        <td><button class="btn-outline" style="padding:2px 10px;font-size:12px" onclick="switchToUser('${u.phone}','${escapeHtml(u.nickname)}')">切换</button></td>
      </tr>
    `).join('')}
  </table>`;
}

function switchToUser(phone, nickname) {
  document.getElementById('phoneInput').value = phone;
  document.getElementById('nicknameInput').value = nickname;
  createUser();
}

// ── 余额 ──
async function refreshBalance() {
  if (!currentUserId) return;
  const res = await fetch(`${BASE}/api/balance/${currentUserId}`);
  const data = await res.json();
  if (data.ok) {
    document.getElementById('currentBalance').innerHTML =
      `${data.balance.amount.toFixed(2)} <span id="balanceUnit">元</span>`;
  }
}

// ── 充值 ──
async function doRecharge() {
  if (!currentUserId) return showResult('rechargeResult', '请先选择用户', 'error');
  const amount = parseFloat(document.getElementById('rechargeAmount').value);
  const method = document.getElementById('rechargeMethod').value;
  const res = await fetch(`${BASE}/api/recharge`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ userId: currentUserId, amount, method }),
  });
  const data = await res.json();
  if (data.ok) {
    showResult('rechargeResult', `✅ 充值成功 +${amount.toFixed(2)}元\n余额: ${data.balance.amount.toFixed(2)}元`, 'success');
    refreshAll();
  } else {
    showResult('rechargeResult', data.error, 'error');
  }
}

// ── 扣款 ──
async function doDeduct() {
  if (!currentUserId) return showResult('deductResult', '请先选择用户', 'error');
  const amount = parseFloat(document.getElementById('deductAmount').value);
  const model = document.getElementById('deductModel').value.trim();
  const taskDesc = document.getElementById('deductTask').value.trim();
  const res = await fetch(`${BASE}/api/deduct`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      userId: currentUserId, amount, model,
      tokensIn: Math.floor(Math.random() * 2000) + 500,
      tokensOut: Math.floor(Math.random() * 1000) + 100,
      taskDesc,
    }),
  });
  const data = await res.json();
  if (data.ok) {
    showResult('deductResult', `✅ 扣款成功 -${amount.toFixed(2)}元\n余额: ${data.balance.amount.toFixed(2)}元\n模型: ${model}`, 'success');
    refreshAll();
  } else {
    showResult('deductResult', data.error, 'error');
  }
}

// ── 充值记录 ──
async function refreshRechargeRecords() {
  if (!currentUserId) return;
  const res = await fetch(`${BASE}/api/recharge/records/${currentUserId}`);
  const data = await res.json();
  const el = document.getElementById('rechargeRecords');
  if (!data.ok || data.records.length === 0) { el.innerHTML = '<div class="result-empty">暂无充值记录</div>'; return; }
  el.innerHTML = `<table>
    <tr><th>#</th><th>金额</th><th>方式</th><th>订单号</th><th>时间</th></tr>
    ${data.records.map(r => `
      <tr>
        <td>${r.id}</td>
        <td style="color:#27ae60;font-weight:600">+${r.amount.toFixed(2)}</td>
        <td><span class="badge badge-${r.method === 'wechat' ? 'green' : r.method === 'alipay' ? 'blue' : 'orange'}">${r.method === 'wechat' ? '微信' : r.method === 'alipay' ? '支付宝' : r.method}</span></td>
        <td style="font-size:11px;color:#888">${r.order_id ? r.order_id : '-'}</td>
        <td style="color:#888;font-size:12px">${r.created_at}</td>
      </tr>
    `).join('')}
  </table>`;
}

// ── 消费记录 ──
async function refreshDeductRecords() {
  if (!currentUserId) return;
  const res = await fetch(`${BASE}/api/deduct/records/${currentUserId}`);
  const data = await res.json();
  const el = document.getElementById('deductRecords');
  if (!data.ok || data.records.length === 0) { el.innerHTML = '<div class="result-empty">暂无消费记录</div>'; return; }
  el.innerHTML = `<table>
    <tr><th>#</th><th>金额</th><th>模型</th><th>tokens</th><th>描述</th><th>时间</th></tr>
    ${data.records.map(r => `
      <tr>
        <td>${r.id}</td>
        <td style="color:#e74c3c;font-weight:600">-${r.amount.toFixed(2)}</td>
        <td style="font-size:12px">${r.model || '-'}</td>
        <td style="font-size:12px;color:#888">${r.tokens_in || 0}→${r.tokens_out || 0}</td>
        <td style="font-size:12px;color:#666">${r.task_desc || '-'}</td>
        <td style="font-size:12px;color:#888">${r.created_at}</td>
      </tr>
    `).join('')}
  </table>`;
}

// ── 统计 ──
async function refreshStats() {
  if (!currentUserId) return;
  const res = await fetch(`${BASE}/api/stats/${currentUserId}`);
  const data = await res.json();
  if (data.ok) {
    document.getElementById('statTotalPaid').textContent = data.stats.totalPaid.toFixed(2);
    document.getElementById('statTotalRefunded').textContent = data.stats.totalRefunded.toFixed(2);
    document.getElementById('statPaidOrders').textContent = data.stats.paidOrderCount;
    document.getElementById('statTotalOrders').textContent = data.stats.orderCount;
    document.getElementById('statTotalDeduct').textContent = data.stats.totalDeduction.toFixed(2);
    document.getElementById('statDeductCount').textContent = data.stats.deductionCount;
  }
}

// ════════════════════════════════════════════════════════════════
//  聚合支付 — 前端操作
// ════════════════════════════════════════════════════════════════

// ── 加载支付渠道 ──
async function loadChannels() {
  const res = await fetch(`${BASE}/api/pay/channels`);
  const data = await res.json();
  if (!data.ok) return;
  document.getElementById('channelList').innerHTML = data.channels.map(ch => `
    <div style="padding:12px;background:#f8f9fa;border-radius:8px;text-align:center">
      <div style="font-size:24px;margin-bottom:4px">${ch.id === 'wechat' ? '💚' : ch.id === 'alipay' ? '💙' : '🖤'}</div>
      <div style="font-weight:600;font-size:14px">${ch.name}</div>
      <div style="font-size:11px;color:#888;margin-top:4px">${ch.description || '模拟支付'}</div>
      <div style="font-size:11px;color:#3498db;margin-top:4px">← ${ch.mock_type}</div>
    </div>
  `).join('');
}

// ── 创建支付订单 ──
async function createPaymentOrder() {
  if (!currentUserId) return showResult('payResult', '请先选择用户', 'error');
  const amount = parseFloat(document.getElementById('payAmount').value);
  const subject = document.getElementById('paySubject').value.trim();
  const channel = document.getElementById('payChannel').value;
  const description = document.getElementById('payDescription').value.trim();
  const callback_url = document.getElementById('payCallbackUrl').value.trim();

  const res = await fetch(`${BASE}/api/pay/orders`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ user_id: currentUserId, amount, subject, description, channel, callback_url }),
  });
  const data = await res.json();
  if (data.ok) {
    const order = data.order;
    let payInfoStr = '';
    if (order.pay_info) {
      payInfoStr = '\n\n' + JSON.stringify(order.pay_info, null, 2);
    }
    showResult('payResult', `✅ 订单创建成功\n\n订单号: ${order.order_id}\n金额: ${order.amount.toFixed(2)}元\n渠道: ${order.channel}\n状态: ${order.status}${payInfoStr}`, 'success');
    refreshUserOrders();
    refreshAllOrders();
    // 自动填入手动操作框
    document.getElementById('manualOrderId').value = order.order_id;
    document.getElementById('callbackOrderId').value = order.order_id;
  } else {
    showResult('payResult', '创建失败: ' + data.error, 'error');
  }
}

// ── 快捷支付 ──
async function quickPay() {
  if (!currentUserId) return showResult('payResult', '请先选择用户', 'error');
  const amount = parseFloat(document.getElementById('payAmount').value);
  const subject = document.getElementById('paySubject').value.trim();
  const channel = document.getElementById('payChannel').value;
  const description = document.getElementById('payDescription').value.trim();

  const res = await fetch(`${BASE}/api/pay/quick`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ user_id: currentUserId, amount, subject, description, channel }),
  });
  const data = await res.json();
  if (data.ok) {
    showResult('payResult', `⚡ 快捷支付成功\n\n订单号: ${data.order.order_id}\n金额: ${data.order.amount.toFixed(2)}元\n状态: ${data.order.status}\n余额: ${data.order.amount.toFixed(2)}元已到账`, 'success');
    refreshAll();
    refreshUserOrders();
    refreshAllOrders();
    document.getElementById('manualOrderId').value = data.order.order_id;
  } else {
    showResult('payResult', '快捷支付失败: ' + data.error, 'error');
  }
}

// ── 手动模拟支付 ──
async function manualPay() {
  const orderId = document.getElementById('manualOrderId').value.trim();
  if (!orderId) return showResult('manualPayResult', '请输入订单号', 'error');
  const res = await fetch(`${BASE}/api/pay/orders/${orderId}/pay`, { method: 'POST' });
  const data = await res.json();
  if (data.ok) {
    let msg = `✅ 模拟支付成功\n\n订单号: ${data.order.order_id}\n状态: ${data.order.status}\n金额: ${data.order.amount.toFixed(2)}元`;
    if (data.callback) {
      msg += `\n回调: ${data.callback.status} (${data.callback.http_code || data.callback.error || '无'})`;
    }
    showResult('manualPayResult', msg, 'success');
    refreshAll();
    refreshUserOrders();
    refreshAllOrders();
  } else {
    showResult('manualPayResult', data.error, 'error');
  }
}

// ── 关闭订单 ──
async function manualClose() {
  const orderId = document.getElementById('manualOrderId').value.trim();
  if (!orderId) return showResult('manualPayResult', '请输入订单号', 'error');
  const res = await fetch(`${BASE}/api/pay/orders/${orderId}/close`, { method: 'POST' });
  const data = await res.json();
  if (data.ok) {
    showResult('manualPayResult', `🔒 订单已关闭\n订单号: ${data.order.order_id}\n状态: ${data.order.status}`, 'success');
    refreshUserOrders();
    refreshAllOrders();
  } else {
    showResult('manualPayResult', data.error, 'error');
  }
}

// ── 退款 ──
async function manualRefund() {
  const orderId = document.getElementById('manualOrderId').value.trim();
  if (!orderId) return showResult('manualPayResult', '请输入订单号', 'error');
  const res = await fetch(`${BASE}/api/pay/orders/${orderId}/refund`, { method: 'POST' });
  const data = await res.json();
  if (data.ok) {
    showResult('manualPayResult', `↩️ 退款成功\n订单号: ${data.order.order_id}\n状态: ${data.order.status}\n金额已从余额扣除`, 'success');
    refreshAll();
    refreshUserOrders();
    refreshAllOrders();
  } else {
    showResult('manualPayResult', data.error, 'error');
  }
}

// ── 查询订单 ──
async function manualQueryOrder() {
  const orderId = document.getElementById('manualOrderId').value.trim();
  if (!orderId) return showResult('manualPayResult', '请输入订单号', 'error');
  const res = await fetch(`${BASE}/api/pay/orders/${orderId}`);
  const data = await res.json();
  if (data.ok) {
    showResult('manualPayResult', `🔍 订单信息\n\n${JSON.stringify(data.order, null, 2)}`, '');
  } else {
    showResult('manualPayResult', '订单不存在', 'error');
  }
}

// ── 查询回调日志 ──
async function queryCallbacks() {
  const orderId = document.getElementById('callbackOrderId').value.trim();
  if (!orderId) return;
  const res = await fetch(`${BASE}/api/pay/callbacks/${orderId}`);
  const data = await res.json();
  const el = document.getElementById('callbackLogs');
  if (!data.ok || data.logs.length === 0) {
    el.innerHTML = '<div class="result-empty">暂无回调日志</div>';
    return;
  }
  el.innerHTML = `<table>
    <tr><th>#</th><th>状态</th><th>回执</th><th>HTTP码</th><th>重试</th><th>时间</th></tr>
    ${data.logs.map(l => `
      <tr>
        <td>${l.id}</td>
        <td><span class="badge badge-${l.status === 'success' ? 'green' : 'red'}">${l.status}</span></td>
        <td style="font-size:11px;color:#888;max-width:200px;overflow:hidden;text-overflow:ellipsis">${l.response_body ? l.response_body.substring(0, 50) : '-'}</td>
        <td>${l.response_code || '-'}</td>
        <td>${l.retry_count}</td>
        <td style="font-size:12px;color:#888">${l.created_at}</td>
      </tr>
    `).join('')}
  </table>`;
}

// ── 用户订单 ──
async function refreshUserOrders() {
  if (!currentUserId) return;
  const res = await fetch(`${BASE}/api/pay/orders/user/${currentUserId}`);
  const data = await res.json();
  renderOrders('myOrders', data);
}

// ── 全部订单 ──
async function refreshAllOrders() {
  const res = await fetch(`${BASE}/api/pay/orders`);
  const data = await res.json();
  renderOrders('allOrders', data);
}

function renderOrders(elId, data) {
  const el = document.getElementById(elId);
  if (!data.ok || data.orders.length === 0) {
    el.innerHTML = '<div class="result-empty">暂无订单</div>';
    return;
  }
  el.innerHTML = `<table>
    <tr><th>订单号</th><th>金额</th><th>渠道</th><th>状态</th><th>标题</th><th>时间</th></tr>
    ${data.orders.map(o => {
      const statusBadge = {
        'pending': 'badge-orange',
        'paying': 'badge-blue',
        'paid': 'badge-green',
        'failed': 'badge-red',
        'closed': 'badge-gray',
        'refunded': 'badge-red',
      }[o.status] || 'badge-gray';
      return `<tr>
        <td style="font-family:monospace;font-size:12px">${o.order_id}</td>
        <td style="font-weight:600">${o.amount.toFixed(2)}</td>
        <td>${o.channel}</td>
        <td><span class="badge ${statusBadge}">${o.status}</span></td>
        <td style="font-size:12px;color:#666">${o.subject || '-'}</td>
        <td style="font-size:12px;color:#888">${o.created_at}</td>
      </tr>`;
    }).join('')}
  </table>`;
}

// ── 刷新增量 ──
function refreshAll() {
  refreshBalance();
  refreshDeductRecords();
  refreshStats();
  refreshUserOrders();
  refreshAllOrders();
}

// ── 工具 ──
function showResult(id, content, type) {
  const el = document.getElementById(id);
  el.style.display = 'block';
  el.textContent = content;
  el.className = 'result ' + (type || '');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── 启动 ──
async function init() {
  const online = await checkServer();
  if (online) {
    await loadChannels();
    const restored = await restoreLastUser();
    if (!restored) {
      document.getElementById('phoneInput').placeholder = '输入手机号，点击创建';
    }
    refreshAllOrders();
  }
}

init();
</script>
